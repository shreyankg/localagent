# LocalAgent Default Configuration
# Runtime config is stored at: ~/.config/localagent/config.yaml
# Copy this file there to customize.

model:
  # Any MLX-compatible model path (HuggingFace ID or local path)
  model_path: "mlx-community/Llama-3.2-3B-Instruct-4bit"
  max_tokens: 2048
  temperature: 0.3

skills:
  file-organizer:
    # Directories to organize (expanded at runtime)
    watch_directories:
      - "~/Downloads"
      - "~/Documents"

    # Glob patterns to exclude from scanning
    exclude_patterns:
      - ".DS_Store"
      - ".localized"
      - "*.crdownload"
      - "*.part"
      - "*.tmp"
      - ".gitkeep"

    # Skip hidden files (starting with '.')
    skip_hidden: true

    # Max bytes to read for content preview of text files
    content_preview_bytes: 512

    # Additional file extensions to treat as text for content preview
    # (added on top of the built-in set; use lowercase with leading dot)
    # extra_text_extensions:
    #   - ".rtf"
    #   - ".nfo"

    # Embedding model for file clustering (BERT-based, loaded via transformers)
    embedding_model_path: "BAAI/bge-small-en-v1.5"

    # Cosine distance threshold for agglomerative clustering.
    # Lower = tighter clusters (more categories), higher = looser (fewer).
    cluster_distance_threshold: 0.4

    # Max files sampled per cluster when asking the LLM to name it
    max_cluster_samples: 8

    # Warn (in logs) if a single run proposes more than this many moves
    move_warning_threshold: 50

triggers:
  file-organizer:
    type: cron
    schedule: "0 12 * * *"  # Daily at noon
